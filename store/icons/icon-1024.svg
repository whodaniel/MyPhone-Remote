<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#0a0a0a"/>
  
  <!-- WiFi waves -->
  <path d="M512 700 a180 180 0 0 1 -127-53" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.3" fill="none"/>
  <path d="M512 700 a260 260 0 0 1 -183-77" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.2" fill="none"/>
  <path d="M512 700 a340 340 0 0 1 -240-101" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.1" fill="none"/>
  <path d="M512 700 a180 180 0 0 0 127-53" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.3" fill="none"/>
  <path d="M512 700 a260 260 0 0 0 183-77" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.2" fill="none"/>
  <path d="M512 700 a340 340 0 0 0 240-101" stroke="#00ff88" stroke-width="16" stroke-linecap="round" opacity="0.1" fill="none"/>
  
  <!-- Phone body -->
  <rect x="384" y="220" width="256" height="520" rx="40" stroke="#00ff88" stroke-width="8" fill="#111"/>
  
  <!-- Screen -->
  <rect x="404" y="280" width="216" height="400" rx="8" fill="#1a1a1a"/>
  
  <!-- Play button on screen -->
  <path d="M480 440 l80 48-80 48V440z" fill="#00ff88"/>
  
  <!-- Home indicator -->
  <rect x="464" y="696" width="96" height="6" rx="3" fill="#333"/>
  
  <!-- Glow -->
  <circle cx="512" cy="480" r="200" fill="url(#glow)" opacity="0.4"/>
  
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
